#seed: 13
use_gpu: True
device: 0
eval_device: 0
early_stop:
  patience: 0
federate:
  mode: standalone
  client_num: 6
  total_round_num: 200
  save_to: "final_llama_csn_fedit.ckpt"
  save_freq: 40
  share_local_model: True
  online_aggr: False
data:
  root: data/
  type: 'code_search_net@llm'
  splits: [0.998,0.001,0.001]
  splitter: 'meta'
  subsample: 0.05
llm:
  tok_len: 650
  chat:
    max_len: 1000
  adapter:
    use: True
    args: [ { 'adapter_package': 'peft', 'adapter_method': 'lora', 'r': 8, 'lora_alpha': 16, 'lora_dropout': 0.05 } ]
dataloader:
  batch_size: 1
model:
  type: 'meta-llama/Meta-Llama-3-8B@huggingface_llm'
train:
  local_update_steps: 30
  batch_or_epoch: batch
  optimizer:
    lr: 0.005
  is_enable_half: True
criterion:
  type: CrossEntropyLoss
trainer:
  type: llmtrainer
eval:
  freq: 200
  metrics: ['loss']
  best_res_update_round_wise_key: val_loss
  count_flops: False
lora:
  method: "shareAB"  # option: shareA, shareB, swap
  rotate: False
  initialshare: 'A'