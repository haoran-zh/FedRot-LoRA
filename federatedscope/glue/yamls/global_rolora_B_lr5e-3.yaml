seed: 11
use_gpu: True
device: 2
early_stop:
  patience: 0
federate:
  freeze_A: False
  mode: standalone
  client_num: 3
  total_round_num: 500
  save_to: "rolora_mnli-m.ckpt"
  share_local_model: True
  online_aggr: False
  make_global_eval: True
personalization:
  local_param: []
data:
  root: data/
  type: 'mnli@glue'
  matched: True
  splitter: 'lda'
  splitter_args: [{'alpha': 0.5}]
llm:
  tok_len: 128
  adapter:
    use: True
    args: [ { 'adapter_package': 'peft', 'adapter_method': 'lora', 'r': 4, 'lora_alpha': 8, 'lora_dropout': 0.05 } ]
dataloader:
  batch_size: 128
model:
  type: 'FacebookAI/roberta-large@huggingface_llm'
train:
  local_update_steps: 10
  batch_or_epoch: batch
  optimizer:
    lr: 5e-3
  is_enable_half: True
criterion:
  type: CrossEntropyLoss
trainer:
  type: gluetrainer
eval:
  freq: 1
  metrics: ['accuracy']
  count_flops: False
  best_res_update_round_wise_key: 'val_accuracy'
lora:
  rolora: True
  method: "swap"  # option: shareA, shareB, swap
  rotate: False
  initialshare: 'B'